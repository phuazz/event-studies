<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Event Studies</title>
<style>
:root{
  --bg:#FAFAF8; --sf:#FFF; --sa:#F4F3EF; --bd:#E2E0DA; --bl:#EEECE7;
  --t1:#1A1A18; --t2:#45433E; --t3:#6B6863;
  --ac:#2563EB; --gn:#15803D; --gnb:#ECFDF3; --rd:#DC2626; --rdb:#FEF2F2; --am:#B45309;
  --r:12px; --rs:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;
  background:var(--bg);color:var(--t1);line-height:1.55;font-size:15px;-webkit-font-smoothing:antialiased}
.wrap{max-width:1100px;margin:0 auto;padding:28px 28px 80px}
.hdr{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;margin-bottom:22px;
  border-bottom:1px solid var(--bd);padding-bottom:18px}
.hdr h1{font-size:26px;font-weight:700;letter-spacing:-.4px}
.hdr .sub{font-size:13px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
.hdr .meta{font-size:13px;color:var(--t2);text-align:right}
.note{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:16px 20px;font-size:14px;
  color:var(--t2);margin-bottom:20px}
.note strong{color:var(--t1)}
.pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px}
.pill{padding:9px 15px;font-size:14px;font-weight:500;border:1px solid var(--bd);border-radius:22px;
  background:var(--sf);color:var(--t2);cursor:pointer;transition:all .12s}
.pill:hover{border-color:var(--t3);color:var(--t1)}
.pill.on{background:var(--t1);color:#fff;border-color:var(--t1)}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:22px 24px;margin-bottom:20px}
.card h2{font-size:20px;font-weight:700;margin-bottom:10px}
.kv{font-size:14px;color:var(--t2);margin:6px 0;line-height:1.6}
.kv b{color:var(--t1);font-weight:600}
.tags{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
.tag{font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;background:var(--sa);color:var(--t2)}
.tag.warn{background:#FFFBEB;color:var(--am);border:1px solid #FDE68A}
.sec-lbl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);
  margin:24px 0 12px}
/* chart */
.chart{display:flex;align-items:flex-end;gap:18px;height:230px;padding:10px 4px 0;border-bottom:1px solid var(--bd);margin-bottom:6px}
.col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;position:relative}
.bars{display:flex;align-items:flex-end;gap:5px;height:100%;width:100%;justify-content:center}
.bar{width:26px;border-radius:3px 3px 0 0;position:relative}
.bar.cond{background:var(--ac)}
.bar.cond.neg{background:var(--rd)}
.bar.base{background:transparent;border:1.5px solid var(--t3)}
.bar .val{position:absolute;top:-19px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:600;
  white-space:nowrap;color:var(--t2)}
.xlab{font-size:12px;color:var(--t3);margin-top:8px;font-weight:600}
.legend{display:flex;gap:18px;font-size:12px;color:var(--t3);margin:10px 0 4px}
.legend span{display:inline-flex;align-items:center;gap:6px}
.sw{width:13px;height:13px;border-radius:3px;display:inline-block}
.sw.cond{background:var(--ac)}.sw.base{border:1.5px solid var(--t3)}
/* kpi cards + credibility gate + live panel (adapted from the Signal Tracker) */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.kpi{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px}
.kpi .l{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:5px}
.kpi .v{font-size:24px;font-weight:700;line-height:1}
.kpi .s{font-size:11.5px;color:var(--t3);margin-top:4px}
.gate{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px;vertical-align:middle}
.gate-act{background:var(--gnb);color:var(--gn);border:1px solid #A7F3D0}
.gate-monitor{background:#FFFBEB;color:var(--am);border:1px solid #FDE68A}
.gate-ignore{background:var(--sa);color:var(--t3);border:1px solid var(--bd)}
.gdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:middle}
.brk{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0 2px;align-items:center}
.brk .bl{font-size:11.5px;color:var(--t3);font-weight:600;margin-right:2px}
.brk span.b{font-size:11.5px;background:var(--sa);border-radius:6px;padding:3px 8px;color:var(--t2)}
.live{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:var(--rs);padding:12px 15px;margin:14px 0;font-size:13px;line-height:1.65;color:var(--t1)}
.live b{font-weight:700}
/* overview — severity-led live monitor: verdict first, colour = severity */
.views{display:flex;gap:8px;margin-bottom:6px}
.view{padding:8px 16px;font-size:14px;font-weight:600;border:1px solid var(--bd);border-radius:var(--rs);
  background:var(--sf);color:var(--t2);cursor:pointer;transition:all .12s}
.view.on{background:var(--t1);color:#fff;border-color:var(--t1)}
.plabel{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);margin:16px 0 8px}
.ov-state{font-size:14.5px;color:var(--t2);margin:2px 0 16px;line-height:1.6}
.ov-state b{color:var(--t1)}
.ov{border:1px solid var(--bd);border-left:4px solid #CFCEC8;border-radius:var(--r);background:var(--sf);
  padding:16px 18px;margin-bottom:12px}
.ov.sev-breach{border-left-color:var(--rd);background:#FFFCFB}
.ov.sev-edge{border-left-color:var(--am)}
.ov-verdict{font-size:16.5px;font-weight:700;letter-spacing:-.2px;line-height:1.3}
.ov.sev-breach .ov-verdict{color:var(--rd)}
.ov.sev-edge .ov-verdict{color:var(--am)}
.ov-name{font-size:13px;color:var(--t2);font-weight:600;margin-top:3px}
.ov-grid{display:grid;grid-template-columns:1fr auto;gap:22px;align-items:center;margin-top:14px}
@media(max-width:760px){.ov-grid{grid-template-columns:1fr;gap:12px}}
.ov-meta{font-size:12px;color:var(--t3);margin-top:8px;line-height:1.6}
/* label/value rows — scannable, not prose */
.ov-kv{display:grid;grid-template-columns:auto 1fr;gap:7px 16px;margin:0;font-size:13.5px;align-items:baseline}
.ov-kv dt{color:var(--t3);font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;
  white-space:nowrap;padding-top:1px}
.ov-kv dd{margin:0;color:var(--t2);line-height:1.5}
.ov-kv dd b{color:var(--t1);font-variant-numeric:tabular-nums}
.ov-kv dd b.neg{color:var(--rd)}.ov-kv dd b.pos{color:var(--gn)}
.ov-note{font-size:11px;color:var(--t3);text-align:center;margin-top:2px}
.ov-legend{display:flex;flex-wrap:wrap;gap:16px;font-size:12px;color:var(--t3);margin:0 0 16px;align-items:center}
.ov-legend span{display:inline-flex;align-items:center;gap:6px}
.ov-legend i{display:inline-block}
.lg-dot{width:10px;height:10px;border-radius:50%;background:#2563EB;border:1.5px solid #fff;
  box-shadow:0 0 0 1px #2563EB}
.lg-med{width:2px;height:12px;background:#1A1A18}
.lg-band{width:22px;height:10px;border-radius:2px;background:#F59E0B;opacity:.30}
details.disc{margin:14px 0 0;font-size:12.5px;color:var(--t3)}
details.disc summary{cursor:pointer;color:var(--t2);font-weight:600;user-select:none}
details.disc div{margin-top:9px;line-height:1.75}
@media(max-width:640px){.kpis{grid-template-columns:1fr 1fr}}
/* fan */
.fan-wrap{position:relative}
#fanSvg{cursor:crosshair}
.fan-tip{position:absolute;pointer-events:none;background:#fff;border:1px solid var(--bd);border-radius:8px;
  padding:8px 11px;font-size:12px;line-height:1.55;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:5;
  min-width:158px;color:var(--t1)}
.fan-tip b{font-weight:700}
/* table */
table{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:6px}
th{text-align:right;padding:8px 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;
  color:var(--t3);border-bottom:1px solid var(--bd);white-space:nowrap}
th:first-child,td:first-child{text-align:left}
td{text-align:right;padding:8px 10px;border-bottom:1px solid var(--bl);white-space:nowrap;font-variant-numeric:tabular-nums}
td.pos{color:var(--gn);font-weight:600}td.neg{color:var(--rd);font-weight:600}
tr:hover td{background:var(--sa)}
.sig{font-weight:700}
.dim{color:var(--t3)}
.err{background:var(--rdb);border:1px solid #FECACA;color:var(--rd);padding:16px 20px;border-radius:var(--r)}
.foot{font-size:12px;color:var(--t3);margin-top:24px;text-align:center}
@media(max-width:640px){.chart{gap:8px}.bar{width:18px}.bar.base{width:18px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div>
      <h1>Event Studies</h1>
      <div class="sub">Pre-registered forward-return analysis</div>
    </div>
    <div class="meta" id="meta"></div>
  </div>
  <div id="root"><div class="kv">Loading…</div></div>
  <div class="foot">Private research-intake feeds this engine; licensed source content is never published. Numbers are our own, computed on our data.</div>
</div>

<script>
const HZ_FALLBACK=['1W','2W','1M','2M','3M','6M','1Y'];
const pctf=(v,d=2)=> (v==null||Number.isNaN(v))?'—':(v*100).toFixed(d);
const sgn=v=> v>0?'pos':(v<0?'neg':'');

function q(a,p){if(!a.length)return NaN;const s=a.slice().sort((x,y)=>x-y);const pos=(s.length-1)*p,lo=Math.floor(pos),hi=Math.ceil(pos);return lo===hi?s[lo]:s[lo]+(s[hi]-s[lo])*(pos-lo);}

// Build the forward-path distribution from priceSeries + episode indices.
// At each forward trading day k: percentiles of cumulative return across episodes,
// plus the running-minimum drawdown (so we can draw the worst-path envelope).
// excludeLast: drop the most recent episode. The LIVE instance must never sit
// inside the distribution it is being judged against — a bad instance otherwise
// drags down its own benchmark and understates how unusual it is.
function buildFan(ev,excludeLast){
  const ps=ev.priceSeries||[];
  let eps=(ev.episodes||[]).map(e=>e.idx).filter(i=>i!=null);
  if(excludeLast) eps=eps.slice(0,-1);
  const fan=[{k:0,n:eps.length,p10:0,p25:0,p50:0,p75:0,p90:0,mn:0,mx:0,ddMed:0,ddBad:0}];
  for(let k=1;k<=252;k++){
    const rets=[],dds=[];
    for(const idx of eps){
      if(idx+k>=ps.length)continue;
      const e=ps[idx].ac; rets.push(ps[idx+k].ac/e-1);
      let lo=0; for(let j=1;j<=k;j++){ if(idx+j<ps.length){const r=ps[idx+j].ac/e-1; if(r<lo)lo=r;} } dds.push(lo);
    }
    if(rets.length<3)break;
    fan.push({k,n:rets.length,p10:q(rets,.1),p25:q(rets,.25),p50:q(rets,.5),p75:q(rets,.75),p90:q(rets,.9),
      mn:Math.min(...rets),mx:Math.max(...rets),ddMed:q(dds,.5),ddBad:q(dds,.1)});
  }
  return fan;
}

let FAN=null;
function fanChart(ev){
  const fan=ev.fan||buildFan(ev);
  if(fan.length<4){FAN=null;return `<div class="kv dim">Range-of-outcomes fan needs ≥3 episodes with a forward window — not enough here (n=${ev.nEpisodes}).</div>`;}
  const W=720,H=280,mL=46,mR=14,mT=14,mB=26,pw=W-mL-mR,ph=H-mT-mB;
  const K=fan[fan.length-1].k;
  // Latest instance realized path (the most recent trigger — e.g. the live one).
  // A monthly/seasonal event supplies the engine-precomputed daily fanLatest.
  const ps=ev.priceSeries||[], lastEp=ev.episodes[ev.episodes.length-1];
  let latest={date:lastEp?lastEp.date:'',path:[]};
  if(ev.fanLatest){latest={date:ev.fanLatest.date,path:(ev.fanLatest.path||[]).filter(p=>p.k<=K)};}
  else if(lastEp&&lastEp.idx!=null){const i0=lastEp.idx;for(let k=0;i0+k<ps.length&&k<=K;k++)latest.path.push({k,v:ps[i0+k].ac/ps[i0].ac-1});}
  // Scale to what is actually DRAWN — p10/p90 bands, the drawdown line, and the
  // latest path — not the raw min/max episode (which would leave dead space).
  let yMin=0,yMax=0; for(const f of fan){yMin=Math.min(yMin,f.p10,f.ddBad);yMax=Math.max(yMax,f.p90);}
  for(const p of latest.path){yMin=Math.min(yMin,p.v);yMax=Math.max(yMax,p.v);}
  yMin*=1.06;yMax*=1.06; if(yMax<=yMin)yMax=yMin+0.01;
  const sx=k=>mL+k/K*pw, sy=v=>mT+(yMax-v)/(yMax-yMin)*ph;
  const line=key=>fan.map(f=>`${sx(f.k).toFixed(1)},${sy(f[key]).toFixed(1)}`).join(' ');
  const band=(hi,lo)=>fan.map(f=>`${sx(f.k).toFixed(1)},${sy(f[hi]).toFixed(1)}`)
    .concat(fan.slice().reverse().map(f=>`${sx(f.k).toFixed(1)},${sy(f[lo]).toFixed(1)}`)).join(' ');
  const HZK=[[5,'1W'],[21,'1M'],[63,'3M'],[126,'6M'],[189,'9M'],[252,'1Y']].filter(([k])=>k<=K);
  const markers=HZK.map(([k,l])=>{const f=fan.find(x=>x.k>=k)||fan[fan.length-1];
    return `<circle cx="${sx(f.k).toFixed(1)}" cy="${sy(f.p50).toFixed(1)}" r="3" fill="#1A1A18"/><text x="${sx(f.k).toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="11" fill="#6B6863">${l}</text>`}).join('');
  let gl=''; const ticks=4;
  for(let i=0;i<=ticks;i++){const v=yMin+(yMax-yMin)*i/ticks;const y=sy(v).toFixed(1);
    gl+=`<line x1="${mL}" y1="${y}" x2="${W-mR}" y2="${y}" stroke="#EEECE7"/><text x="${mL-6}" y="${(+y+3).toFixed(1)}" text-anchor="end" font-size="11" fill="#6B6863">${(v*100).toFixed(0)}%</text>`;}
  const zeroY=sy(0).toFixed(1);
  const latestLine = latest.path.length>=2 ?
    `<polyline points="${latest.path.map(p=>`${sx(p.k).toFixed(1)},${sy(p.v).toFixed(1)}`).join(' ')}" fill="none" stroke="#2563EB" stroke-width="2.5"/>`
    +`<circle cx="${sx(latest.path[latest.path.length-1].k).toFixed(1)}" cy="${sy(latest.path[latest.path.length-1].v).toFixed(1)}" r="3.8" fill="#2563EB"/>` : '';
  FAN={fan,latest,geom:{mL,pw,K,W,H,mT,ph,yMin,yMax}};
  return `<div class="fan-wrap"><svg id="fanSvg" viewBox="0 0 ${W} ${H}" width="100%" style="width:100%;height:auto;display:block">
    <defs><linearGradient id="fanG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#DC2626"/><stop offset="0.5" stop-color="#EA580C"/><stop offset="1" stop-color="#F59E0B"/></linearGradient></defs>
    ${gl}
    <polygon points="${band('p90','p10')}" fill="url(#fanG)" opacity="0.15"/>
    <polygon points="${band('p75','p25')}" fill="url(#fanG)" opacity="0.28"/>
    <line x1="${mL}" y1="${zeroY}" x2="${W-mR}" y2="${zeroY}" stroke="#9E9A92" stroke-dasharray="3 3"/>
    <polyline points="${line('p50')}" fill="none" stroke="#1A1A18" stroke-width="2"/>
    <polyline points="${line('ddBad')}" fill="none" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="5 3"/>
    ${latestLine}
    ${markers}
    <line id="fanGuide" x1="0" y1="${mT}" x2="0" y2="${mT+ph}" stroke="#1A1A18" stroke-width="1" stroke-dasharray="2 2" style="visibility:hidden"/>
    <circle id="fanDot" r="3.8" fill="none" stroke="#1A1A18" stroke-width="1.5" style="visibility:hidden"/>
  </svg><div id="fanTip" class="fan-tip" style="display:none"></div></div>`;
}

function wireFan(){
  if(!FAN) return;
  const wrap=document.querySelector('.fan-wrap'); if(!wrap) return;
  const svg=wrap.querySelector('#fanSvg'), guide=wrap.querySelector('#fanGuide'), dot=wrap.querySelector('#fanDot'), tip=wrap.querySelector('#fanTip');
  const {mL,pw,K,W,mT,ph,yMin,yMax}=FAN.geom;
  const sx=k=>mL+k/K*pw, sy=v=>mT+(yMax-v)/(yMax-yMin)*ph;
  const P=v=>(v>=0?'+':'')+(v*100).toFixed(1)+'%';
  const latestAt=k=>{const p=FAN.latest.path.find(x=>x.k===k);return p?p.v:null;};
  svg.addEventListener('mousemove',e=>{
    const rect=svg.getBoundingClientRect();
    const xs=(e.clientX-rect.left)/rect.width*W;
    let k=Math.round((xs-mL)/pw*K); k=Math.max(0,Math.min(K,k));
    const f=FAN.fan[k]; if(!f) return;
    const gx=sx(k).toFixed(1);
    guide.setAttribute('x1',gx);guide.setAttribute('x2',gx);guide.style.visibility='visible';
    dot.setAttribute('cx',gx);dot.setAttribute('cy',sy(f.p50).toFixed(1));dot.style.visibility='visible';
    const mo=k/21, hz=k===0?'entry':(mo<1?k+'d':mo.toFixed(1)+'mo');
    const lv=latestAt(k);
    tip.innerHTML=`<b>Day ${k}</b> · ${hz} · n=${f.n}`
      +`<div>Median <b>${P(f.p50)}</b></div>`
      +`<div class="dim">25–75%: ${P(f.p25)} … ${P(f.p75)}</div>`
      +`<div class="dim">10–90%: ${P(f.p10)} … ${P(f.p90)}</div>`
      +`<div style="color:var(--rd)">Worst DD: ${P(f.ddBad)}</div>`
      +(lv!=null?`<div style="color:var(--ac)">Latest (${FAN.latest.date}): <b>${P(lv)}</b></div>`:'');
    tip.style.display='block';
    const wr=wrap.getBoundingClientRect();
    let tx=e.clientX-wr.left+14; if(tx+180>wr.width)tx=e.clientX-wr.left-192;
    tip.style.left=Math.max(0,tx)+'px'; tip.style.top=(e.clientY-wr.top+12)+'px';
  });
  svg.addEventListener('mouseleave',()=>{guide.style.visibility='hidden';dot.style.visibility='hidden';tip.style.display='none';});
}

function chart(ev){
  // grouped bars: conditional median (solid) vs baseline median (outline), per horizon
  const rows=ev.byHorizon;
  const vals=rows.flatMap(r=>[r.median,r.baseMedian]).filter(v=>v!=null&&!Number.isNaN(v));
  const maxAbs=Math.max(0.01,...vals.map(Math.abs));
  const H=190; // px usable height each side of zero -> we use single-direction scaling from a mid baseline
  const cols=rows.map(r=>{
    const cv=r.median==null?0:r.median, bv=r.baseMedian==null?0:r.baseMedian;
    const ch=Math.abs(cv)/maxAbs*H, bh=Math.abs(bv)/maxAbs*H;
    return `<div class="col"><div class="bars">
      <div class="bar cond ${cv<0?'neg':''}" style="height:${ch||1}px"><span class="val">${pctf(cv,1)}%</span></div>
      <div class="bar base" style="height:${bh||1}px"></div>
    </div><div class="xlab">${r.label}</div></div>`;
  }).join('');
  return `<div class="legend">
      <span><i class="sw cond"></i> Conditional median</span>
      <span><i class="sw base"></i> Unconditional baseline</span>
    </div><div class="chart">${cols}</div>`;
}

function statsTable(ev){
  const head=`<tr><th>Horizon</th><th>n</th><th>Cond med</th><th>Base med</th><th>Edge</th><th>Hit</th><th>MAE med</th><th>MFE med</th><th>p-value</th><th>Pctile</th></tr>`;
  const rows=ev.byHorizon.map(r=>{
    const sig = (r.pValue!=null && r.pValue<0.10);
    return `<tr>
      <td><b>${r.label}</b></td>
      <td class="dim">${r.n}</td>
      <td class="${sgn(r.median)}">${pctf(r.median,1)}%</td>
      <td class="dim">${pctf(r.baseMedian,1)}%</td>
      <td class="${sgn(r.edgeMedian)}">${pctf(r.edgeMedian,1)}%</td>
      <td>${r.hit==null||Number.isNaN(r.hit)?'—':(r.hit*100).toFixed(0)+'%'}</td>
      <td class="neg">${pctf(r.maeMedian,1)}%</td>
      <td class="pos">${pctf(r.mfeMedian,1)}%</td>
      <td class="${sig?'sig':''}">${r.pValue==null||Number.isNaN(r.pValue)?'—':r.pValue.toFixed(2)}</td>
      <td class="dim">${r.percentile==null||Number.isNaN(r.percentile)?'—':(r.percentile*100).toFixed(0)+'%'}</td>
    </tr>`;
  }).join('');
  return `<table>${head}${rows}</table>`;
}

function epTable(ev){
  const hz=ev.byHorizon.map(r=>r.label);
  const keys=ev.byHorizon.map(r=>r.h);
  const head=`<tr><th>Episode</th><th>Regime</th>${hz.map(l=>`<th>${l}</th>`).join('')}</tr>`;
  const rows=ev.episodes.map(e=>{
    const cells=keys.map(k=>{const v=e.fwd[k];return `<td class="${v==null?'dim':sgn(v)}">${v==null?'—':v.toFixed(1)+'%'}</td>`}).join('');
    return `<tr><td><b>${e.date}</b></td><td class="dim">${e.regime||'—'}</td>${cells}</tr>`;
  }).join('');
  return `<table>${head}${rows}</table>`;
}

// Credibility gate — a transparent 0-10 score (5 components x 0-2), adapted from
// the Signal Tracker but computed entirely from OUR Monte Carlo stats. ACT
// requires both a high total AND some statistical significance; sub-4-episode
// events are floored to IGNORE.
function credibility(ev){
  const bh=ev.byHorizon||[], at=h=>bh.find(r=>r.label===h)||{};
  const sample = ev.nEpisodes>=12?2:ev.nEpisodes>=6?1:0;
  let bestP=1; for(const r of bh){ if(r.edgeMedian>0 && r.pValue!=null && !Number.isNaN(r.pValue) && r.pValue<bestP) bestP=r.pValue; }
  const signif = bestP<0.05?2:bestP<0.10?1:0;
  const m=at('3M'), mfe=m.mfeMedian, mae=m.maeMedian;
  const tail = (mfe!=null&&mae!=null&&mae<0)?(mfe>-mae*1.3?2:mfe>-mae?1:0):(mfe>0?1:0);
  const on=ev.regimeSplit?.on||0, off=ev.regimeSplit?.off||0;
  const regime = Math.min(on,off)>=2?2:Math.min(on,off)>=1?1:0;
  const pos = bh.length?bh.filter(r=>r.edgeMedian>0).length/bh.length:0;
  const consistency = pos>=0.7?2:pos>=0.5?1:0;
  let total=sample+signif+tail+regime+consistency;
  let action = total>=7?'act':total>=5?'monitor':'ignore';
  if(signif===0 && action==='act') action='monitor';
  if(ev.nEpisodes<4) action='ignore';
  return {total,action,bestP,breakdown:{'Sample':sample,'Significance':signif,'Tail asym':tail,'Regime':regime,'Consistency':consistency}};
}
function gate(c){const cls=c.action==='act'?'gate-act':c.action==='ignore'?'gate-ignore':'gate-monitor';return `<span class="gate ${cls}">${c.action.toUpperCase()} ${c.total}/10</span>`;}
function gateDot(c){const col=c.action==='act'?'var(--gn)':c.action==='ignore'?'var(--t3)':'var(--am)';return `<span class="gdot" style="background:${col}"></span>`;}

// Live actual-vs-expected: the most recent trigger, if still within the 1Y
// forward window, marked-to-market against the expected (median) path.
// Cadence-agnostic: `ev.fan`/`ev.fanLatest` (a monthly seasonal event — precomputed
// by the engine on DAILY bars) and buildFan/priceSeries (daily events) are BOTH
// indexed by forward trading day k, so one comparison serves either.
function liveStatus(ev){
  // PRIOR episodes only — the live instance is excluded from its own benchmark.
  // (`ev.fan` / buildFan(ev) span every episode and drive the descriptive card
  // chart; they are the wrong distribution for a live comparison.)
  const fan=ev.fanLatest?ev.fanPrior:buildFan(ev,true);
  if(!fan||fan.length<4) return null;
  let date,k,mtm,lo=0,hi=0;
  if(ev.fanLatest){
    const path=ev.fanLatest.path||[]; if(path.length<2) return null;
    date=ev.fanLatest.date; k=path[path.length-1].k; mtm=path[path.length-1].v;
    for(const p of path){ if(p.k===0) continue; if(p.v<lo)lo=p.v; if(p.v>hi)hi=p.v; }
  }else{
    const ps=ev.priceSeries||[], eps=ev.episodes||[]; if(!eps.length) return null;
    const last=eps[eps.length-1]; if(last.idx==null) return null;
    k=ps.length-1-last.idx; if(k<=0) return null;
    date=last.date; mtm=ps[ps.length-1].ac/ps[last.idx].ac-1;
    for(let j=1;j<=k;j++){const r=ps[last.idx+j].ac/ps[last.idx].ac-1; if(r<lo)lo=r; if(r>hi)hi=r;}
  }
  // Direction over the last 5 forward days (is it still deteriorating, or turning?)
  // and whether the instance is sitting AT its trough right now — i.e. not bouncing.
  let chg5=null;
  if(ev.fanLatest){
    const path=ev.fanLatest.path||[], prev=path.find(p=>p.k===k-5);
    if(prev) chg5=(1+mtm)/(1+prev.v)-1;
  }else{
    const ps=ev.priceSeries||[];
    if(ps.length>5) chg5=ps[ps.length-1].ac/ps[ps.length-6].ac-1;
  }
  const f=fan.find(x=>x.k>=k)||fan[fan.length-1];
  const atLow=Math.abs(mtm-lo)<1e-9;
  return {date,k,mtm,expMed:f?f.p50:null,f,instMAE:lo,instMFE:hi,chg5,atLow,live:k<=252};
}
// Severity — the page's ONE opinion about what deserves attention. Ordered so the
// worst sorts first. A drawdown deeper than the 90th-percentile-worst precedent is
// a genuine break with history; a mark merely below p10 is the edge of the
// distribution, not outside it; everything else is tracking.
function severityOf(s){
  const f=s.f;
  if(f&&f.mn!=null&&s.mtm<f.mn) return {rank:0,key:'below-all',label:`Worse than every one of its ${f.n} precedents`,cls:'sev-breach'};
  if(f&&f.ddBad!=null&&s.instMAE<f.ddBad) return {rank:0,key:'breach',label:'Drawdown beyond anything in its history',cls:'sev-breach'};
  if(f&&s.mtm<f.p10) return {rank:1,key:'edge',label:'At the edge of its historical range',cls:'sev-edge'};
  if(s.expMed!=null&&s.mtm<s.expMed) return {rank:2,key:'behind',label:'Tracking below the median path',cls:'sev-ok'};
  return {rank:3,key:'ok',label:'Tracking at or above the median path',cls:'sev-ok'};
}
// The band as a SCALE, not a label. The axis spans p10..p90 but is widened to
// include the live mark, so an instance outside the distribution is drawn OUTSIDE
// the shaded band — the distinction a text label destroys.
function bandStrip(s){
  const f=s.f; if(!f) return '';
  const W=300,H=52,pad=16,yMid=32;
  const lo=Math.min(f.p10,s.mtm,0), hi=Math.max(f.p90,s.mtm,0);
  const span=(hi-lo)||0.01, a=lo-span*0.10, b=hi+span*0.10;
  const x=v=>pad+(v-a)/(b-a)*(W-2*pad);
  const sev=severityOf(s);
  const mCol=sev.rank<=1?'#DC2626':'#2563EB';
  const mx=x(s.mtm);
  // keep the marker's own label inside the box even when the marker is at an edge
  const lx=Math.max(26,Math.min(W-26,mx));
  return `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" style="max-width:100%">
    <text x="${lx.toFixed(1)}" y="11" font-size="11" font-weight="700" fill="${mCol}" text-anchor="middle">${(s.mtm*100).toFixed(1)}% now</text>
    <line x1="${pad}" y1="${yMid}" x2="${W-pad}" y2="${yMid}" stroke="#E2E0DA" stroke-width="2"/>
    <rect x="${x(f.p10).toFixed(1)}" y="${yMid-7}" width="${(x(f.p90)-x(f.p10)).toFixed(1)}" height="14" fill="#F59E0B" opacity="0.18" rx="2"/>
    <rect x="${x(f.p25).toFixed(1)}" y="${yMid-7}" width="${(x(f.p75)-x(f.p25)).toFixed(1)}" height="14" fill="#F59E0B" opacity="0.30" rx="2"/>
    <line x1="${x(f.p50).toFixed(1)}" y1="${yMid-9}" x2="${x(f.p50).toFixed(1)}" y2="${yMid+9}" stroke="#1A1A18" stroke-width="2"/>
    ${a<0&&b>0?`<line x1="${x(0).toFixed(1)}" y1="${yMid-11}" x2="${x(0).toFixed(1)}" y2="${yMid+11}" stroke="#9E9A92" stroke-width="1" stroke-dasharray="2 2"/>`:''}
    <line x1="${mx.toFixed(1)}" y1="15" x2="${mx.toFixed(1)}" y2="${yMid-7}" stroke="${mCol}" stroke-width="1"/>
    <circle cx="${mx.toFixed(1)}" cy="${yMid}" r="5.5" fill="${mCol}" stroke="#fff" stroke-width="1.5"/>
    <text x="${x(f.p10).toFixed(1)}" y="${H-2}" font-size="9.5" fill="#6B6863" text-anchor="middle">${(f.p10*100).toFixed(0)}%</text>
    <text x="${x(f.p90).toFixed(1)}" y="${H-2}" font-size="9.5" fill="#6B6863" text-anchor="middle">${(f.p90*100).toFixed(0)}%</text>
  </svg>`;
}
// One legend for the whole view — the strip is otherwise a puzzle.
function stripLegend(){
  return `<div class="ov-legend">
    <span><i class="lg-dot"></i> where this instance is now</span>
    <span><i class="lg-med"></i> median of prior precedents</span>
    <span><i class="lg-band"></i> their 10–90% range (darker = 25–75%)</span>
  </div>`;
}
// Where the live mark sits among the SAME event's historical episode paths at the
// same forward day. Reported as a BAND, not a percentile number — with n=12-22
// episodes a precise percentile would be false precision.
function bandOf(mtm,f){
  if(!f) return {label:'—',cls:'dim',out:false};
  if(mtm>f.p90) return {label:'above p90',cls:'pos',out:false};
  if(mtm>f.p75) return {label:'p75–p90',cls:'pos',out:false};
  if(mtm>f.p50) return {label:'p50–p75',cls:'',out:false};
  if(mtm>f.p25) return {label:'p25–p50',cls:'',out:false};
  if(mtm>f.p10) return {label:'p10–p25',cls:'',out:false};
  return {label:'below p10',cls:'neg',out:true};
}
function livePanel(ev){
  const s=liveStatus(ev); if(!s||!s.live) return '';
  const P=v=>(v==null?'—':(v>=0?'+':'')+(v*100).toFixed(1)+'%');
  const mo=s.k/21, inLbl=mo<1?s.k+'d':mo.toFixed(1)+'mo';
  const rel=s.expMed==null?'':(s.mtm-s.expMed>0.005?'ahead of':(s.mtm-s.expMed<-0.005?'behind':'in line with'));
  return `<div class="live"><b>● Live instance</b> — triggered <b>${s.date}</b> (${s.k}d ago, ~${inLbl} into the window).
    Marked-to-market <b>${P(s.mtm)}</b> vs expected median <b>${P(s.expMed)}</b> at this point${rel?` — <b>${rel}</b> expectation`:''}.
    This instance so far: peak <b>${P(s.instMFE)}</b>, trough <span style="color:var(--rd)"><b>${P(s.instMAE)}</b></span>.</div>`;
}

function summaryCards(){
  const evs=DATA.events, creds=evs.map(credibility);
  const live=evs.map(liveStatus).filter(s=>s&&s.live).length;
  const act=creds.filter(c=>c.action==='act').length, mon=creds.filter(c=>c.action==='monitor').length, ign=creds.filter(c=>c.action==='ignore').length;
  const totalEps=evs.reduce((a,e)=>a+(e.nEpisodes||0),0);
  return `<div class="kpis">
    <div class="kpi"><div class="l">Events</div><div class="v">${evs.length}</div><div class="s">${totalEps} episodes total</div></div>
    <div class="kpi"><div class="l">Live now</div><div class="v">${live}</div><div class="s">triggered &amp; still maturing</div></div>
    <div class="kpi"><div class="l">Act-gated</div><div class="v">${act}</div><div class="s">credibility ≥7/10 &amp; significant</div></div>
    <div class="kpi"><div class="l">Monitor / ignore</div><div class="v">${mon} / ${ign}</div><div class="s">below act threshold</div></div>
  </div>`;
}

function renderEvent(ev,data){
  const cred=credibility(ev);
  return `<div class="card">
    <h2>${ev.name} ${gate(cred)}</h2>
    <div class="kv"><b>Definition.</b> ${ev.definition||''}</div>
    <div class="kv"><b>Rationale.</b> ${ev.rationale||''}</div>
    <div class="kv dim">Target: ${ev.target} · forward return from the trigger-day close (event-study convention).</div>
    <div class="tags">
      <span class="tag"><b>${ev.nEpisodes}</b> episodes</span>
      <span class="tag">${ev.nTriggers} triggers</span>
      <span class="tag">regime on/off ${ev.regimeSplit.on}/${ev.regimeSplit.off}</span>
      <span class="tag">${ev.firstDate} → ${ev.lastDate}</span>
      ${ev.nEpisodes<8?`<span class="tag warn">⚠ thin sample (n=${ev.nEpisodes}) — weak evidence</span>`:''}
    </div>
    <div class="brk"><span class="bl">Credibility ${cred.total}/10:</span>${Object.entries(cred.breakdown).map(([k,v])=>`<span class="b">${k} ${v}/2</span>`).join('')}</div>
    ${livePanel(ev)}
    <div class="sec-lbl">Forward returns — conditional vs baseline</div>
    ${chart(ev)}
    <div class="sec-lbl">Range of outcomes — forward-return fan &amp; drawdown envelope</div>
    ${fanChart(ev)}
    <div class="kv dim" style="font-size:12.5px;margin-top:8px">Shaded bands: 10–90th and 25–75th percentile of cumulative forward return across all episodes (red near → amber far), from the trigger close. Black line = median path; markers at 1W/1M/3M/6M/9M/1Y. <b style="color:var(--rd)">Red dashed</b> = the 90th-percentile-worst running drawdown by horizon — the deepest path you would have had to sit through. The <b style="color:var(--ac)">blue line</b> is the latest instance's realised path (the most recent trigger, e.g. the live one). Hover the chart for the median, percentile bands, worst drawdown, and latest-instance value at each forward day. Bands narrow at long horizons as fewer episodes have a full forward window.${ev.cadence==='monthly'?' For this annual seasonal signal the fan is drawn on daily bars anchored at each June close.':''}</div>
    <div class="sec-lbl">Per-horizon statistics</div>
    ${statsTable(ev)}
    <div class="sec-lbl">Episodes</div>
    ${epTable(ev)}
  </div>
  <div class="note" style="margin-top:18px">${data.multipleTestingNote||''}</div>`;
}

// ---- Overview: live-instance monitor ----
// MECHANICAL read-outs only. The catalogue pre-registers the ENTRY (the trigger)
// and the forward HORIZONS; it does NOT pre-register an exit, trim or stop rule.
// So this view reports EVIDENCE — where each live mark sits against the
// distribution of that event's own historical episodes at the same forward day,
// and whether it has broken outside it — and leaves the call to the reader. The
// only tested "exit" we own is the horizon itself.

// Display-only staleness, in whole days. A single UTC millisecond subtraction (no
// calendar arithmetic); the generated date itself is always shown verbatim beside it.
function dataAgeDays(data){
  const g=data.generatedAt?new Date(data.generatedAt):null;
  if(!g||isNaN(g.getTime())) return null;
  return Math.floor((Date.now()-g.getTime())/86400000);
}

const P1=v=>(v==null||Number.isNaN(v)?'—':(v>=0?'+':'')+(v*100).toFixed(1)+'%');

// Progress is measured against the horizon the THESIS is stated over (declared per
// event in the catalogue: a multi-week snap-back for a washout, nine months for the
// seasonal) — NOT a generic 1Y, which would make a maturing instance look young.
function thesisProgress(ev,s){
  const H=ev.thesisHorizonDays;
  if(!H) return {txt:`${s.k}d elapsed`,pct:null};
  const pct=Math.min(100,Math.round(s.k/H*100));
  return {txt:`<b>${s.k}d</b> of its <b>${H}d</b> thesis window · <b>${pct}%</b> through`,pct};
}

// One card shape for every instance — severity is carried by order, colour and the
// verdict line, NOT by hiding the evidence. Facts are label/value rows, not prose.
function ovCard({ev,s,c}){
  const sev=severityOf(s), f=s.f;
  const gap=s.expMed!=null?s.mtm-s.expMed:null;
  const prog=thesisProgress(ev,s);
  const kv=[];

  kv.push(['Where it is now',
    `<b class="${sgn(s.mtm)}">${P1(s.mtm)}</b>${gap!=null?` <span class="dim">· ${Math.abs(gap*100).toFixed(1)}pp ${gap<0?'behind':'ahead of'} the ${P1(s.expMed)} median</span>`:''}`]);

  if(f){
    const vs = s.mtm<f.mn ? `<b class="neg">worse than all ${f.n}</b> <span class="dim">· the worst of them reached ${P1(f.mn)}</span>`
      : s.mtm<f.p10 ? `<b class="neg">in the worst 10%</b> <span class="dim">· their p10 was ${P1(f.p10)}, worst ${P1(f.mn)}</span>`
      : `<span class="dim">inside their ${bandOf(s.mtm,f).label} band</span>`;
    kv.push([`Vs its ${f.n} precedents`, vs]);
  }

  if(f&&f.ddBad!=null){
    const breach=s.instMAE<f.ddBad;
    kv.push(['Drawdown so far',
      `<b class="${breach?'neg':''}">${P1(s.instMAE)}</b> <span class="dim">· deepest any precedent reached by now: ${P1(f.ddBad)}</span>${s.atLow?' <b>· at its low right now</b>':''}`]);
  }

  if(s.chg5!=null) kv.push(['Last 5 days',
    `<b class="${sgn(s.chg5)}">${P1(s.chg5)}</b> <span class="dim">· ${s.chg5<-0.002?'still falling':(s.chg5>0.002?'recovering':'flat')}</span>`]);

  kv.push(['Window', `${prog.txt} <span class="dim">· triggered ${s.date}</span>`]);

  return `<div class="ov ${sev.cls}">
    <div class="ov-verdict">${sev.label}</div>
    <div class="ov-name">${ev.name} ${gate(c)}</div>
    <div class="ov-grid">
      <dl class="ov-kv">${kv.map(([k,v])=>`<dt>${k}</dt><dd>${v}</dd>`).join('')}</dl>
      <div>${bandStrip(s)}${s.k<21?'<div class="ov-note">Early in the window — this read is noisy.</div>':''}</div>
    </div>
  </div>`;
}

function renderOverview(data){
  const age=dataAgeDays(data), stale=age!=null&&age>3;
  const asOf=(data.dailyWindow&&data.dailyWindow.end)||'?';
  const fresh=`<div class="ov-meta" style="margin:0 0 14px">
    ${stale?'<span class="tag warn">⚠ stale</span> ':''}Marks as of <b>${asOf}</b>${stale?` — ${age} days old. Refresh before acting: <code>node scripts/fetch_history.js --max-age-hours=0</code> then <code>node engine/events.js</code>.`:''}</div>`;

  const disc=`<details class="disc"><summary>What this reads — and what it does not</summary>
    <div>The catalogue pre-registers the <b>entry</b> and the <b>forward horizons</b>; it does <b>not</b> pre-register an exit, trim or stop. This is evidence, not instruction — the only tested exit is the horizon itself, so any trim or add is judgement, not a backtested rule. Each mark is measured from its trigger close against the 10th/25th/50th/75th/90th percentiles of that event's OWN historical episode paths at the same forward trading day. Bands rest on n=12–22 episodes and are thin, especially early in a window.</div></details>`;

  const rows=data.events.map(ev=>({ev,s:liveStatus(ev),c:credibility(ev)})).filter(r=>r.s&&r.s.live);
  if(!rows.length) return `<div class="card"><h2>Overview</h2>${fresh}
    <div class="ov-state">No signal is inside its forward window. <b>Nothing to watch.</b></div>${disc}</div>`;

  rows.forEach(r=>r.sev=severityOf(r.s));
  rows.sort((a,b)=>a.sev.rank-b.sev.rank); // worst first — the page's one opinion
  const loud=rows.filter(r=>r.sev.rank<=1), quiet=rows.filter(r=>r.sev.rank>1);

  const nB=loud.filter(r=>r.sev.rank===0).length, nE=loud.filter(r=>r.sev.rank===1).length;
  const state=loud.length
    ? `<b>${nB?`${nB} instance${nB>1?'s are':' is'} behaving unlike anything in ${nB>1?'their':'its'} history`:''}${nB&&nE?'; ':''}${nE?`${nE} sits at the edge of its historical range`:''}.</b> ${quiet.length?`The other ${quiet.length} ${quiet.length>1?'are':'is'} tracking normally.`:''}`
    : `<b>All ${rows.length} live instance${rows.length>1?'s are':' is'} tracking inside ${rows.length>1?'their':'its'} historical range.</b> Nothing needs attention.`;

  return `<div class="card"><h2>Overview</h2>${fresh}
    <div class="ov-state">${state}</div>
    ${stripLegend()}
    ${loud.map(ovCard).join('')}
    ${quiet.length?`<div class="plabel">Tracking normally</div>${quiet.map(ovCard).join('')}`:''}
    ${disc}
  </div>`;
}

let DATA=null, current=-1; // -1 = Overview (the landing view)
function paint(){
  const root=document.getElementById('root');
  if(!DATA||!DATA.events.length){root.innerHTML='<div class="err">No events in results.</div>';return;}
  // Overview is a VIEW; the pills below are ENTITIES. Kept on separate rows so the
  // two navigation levels are not conflated. The inventory KPI row is study-view
  // only — on the Overview the state line carries the read instead.
  const views=`<div class="views"><div class="view ${current===-1?'on':''}" data-i="-1">Overview</div></div>`;
  const pills=DATA.events.map((e,i)=>`<div class="pill ${i===current?'on':''}" data-i="${i}">${gateDot(credibility(e))}${e.name} (${e.nEpisodes})</div>`).join('');
  const nav=views+`<div class="plabel">Studies</div><div class="pills">${pills}</div>`;
  root.innerHTML=(current===-1?'':summaryCards())+nav+(current===-1?renderOverview(DATA):renderEvent(DATA.events[current],DATA));
  root.querySelectorAll('.pill,.view').forEach(p=>p.onclick=()=>{current=+p.dataset.i;paint();});
  if(current!==-1) wireFan();
}

async function boot(){
  try{
    const r=await fetch('events_results.json?v='+Date.now());
    if(!r.ok) throw new Error('events_results.json HTTP '+r.status);
    DATA=await r.json();
    const w=DATA.dailyWindow||{};
    document.getElementById('meta').innerHTML=
      `Generated ${(DATA.generatedAt||'').slice(0,10)}<br>Daily window ${w.start||'?'} → ${w.end||'?'}<br>${DATA.events.length} event(s) × ${(DATA.horizonLabels||HZ_FALLBACK).length} horizons`;
    paint();
  }catch(e){
    document.getElementById('root').innerHTML='<div class="err">Could not load events_results.json — run <code>node engine/events.js</code> first. ('+e.message+')</div>';
  }
}
boot();
</script>
